font_family                             Monaco
font_size                               15
modify_font strikethrough_position      3
modify_font underline_position          4

url_style                               straight
show_hyperlink_targets                  always
click_interval                          0.2

cursor_blink_interval                   0

window_padding_width                    4
tab_bar_edge                            top
tab_bar_style                           powerline
tab_powerline_style                     slanted

